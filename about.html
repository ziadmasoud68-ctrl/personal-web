<!DOCTYPE html>

    <title>STEM Gallery</title>
    <style>
        body { background-color: #0e1012;
         color: #d1d1d1; font-family: "Times New Roman", serif;
         padding: 40px; }
        .gallery-container { max-width: 900px; margin: 0 auto; }
        
        .photo-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }

        .photo-grid img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border: 2px solid #3e4451; 
            border-radius: 10px; 
            transition: transform 0.3s;
        }

        .photo-grid img:hover { transform: scale(1.05); border-color: #56b6c2; }

        .back-link { color: #56b6c2; text-decoration: none; display:
         block; margin-bottom: 20px; }
    </style>
</head>
